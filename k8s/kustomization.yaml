apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - configmap.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml

images:
  - name: ghcr.io/goalixa/goalixa-auth
    newName: harbor.goalixa.com/goalixa-auth/auth
    newTag: f885a9c

# Secret is managed separately - create using:
# kubectl create secret generic auth-secrets \
#   --from-literal=AUTH_JWT_SECRET=<your-jwt-secret> \
#   --from-literal=AUTH_SECRET_KEY=<your-flask-secret> \
#   --from-literal=AUTH_DATABASE_URI=<your-database-uri> \
#   --from-literal=GOOGLE_CLIENT_ID=<your-google-client-id> \
#   --from-literal=GOOGLE_CLIENT_SECRET=<your-google-client-secret> \
#   --from-literal=GOOGLE_REDIRECT_URI=<your-google-redirect-uri> \
#   -n goalixa-auth
