name: Build & Deploy Auth (Helm)

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
      - '**.md'
      - '.argo/**'
      - 'helm/**'  # Ignore Helm chart changes to avoid loop
  pull_request:
    branches:
      - main
    paths-ignore:
      - '.github/**'
      - '**.md'
      - '.argo/**'
      - 'helm/**'

permissions:
  contents: read
  actions: read

env:
  REGISTRY: harbor.goalixa.com
  IMAGE_REPOSITORY: goalixa-auth/auth

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Get image tag
        id: tag
        run: |
          IMAGE_TAG="${GITHUB_SHA:0:7}"
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Update ArgoCD application
        run: |
          IMAGE_TAG="${{ steps.tag.outputs.tag }}"

          echo "🔄 Updating ArgoCD application with image tag: ${IMAGE_TAG}"

          # Patch ArgoCD app with new Helm parameter
          kubectl patch application goalixa-auth \
            -n argocd \
            --type='merge' \
            -p="{
              \"spec\": {
                \"source\": {
                  \"helm\": {
                    \"parameters\": [
                      {
                        \"name\": \"image.tag\",
                        \"value\": \"${IMAGE_TAG}\"
                      }
                    ]
                  }
                }
              }
            }"

          # Trigger immediate sync
          kubectl annotate application goalixa-auth \
            -n argocd \
            "force-sync-at=$(date +%s)" \
            --overwrite

          echo "✅ ArgoCD application updated"

      - name: Summary
        run: |
          echo "## ✅ Build & Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag:** \`${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Full Image:** \`${{ steps.tag.outputs.image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry:** \`${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment Method:** Helm (ArgoCD)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔄 ArgoCD will now:" >> $GITHUB_STEP_SUMMARY
          echo "1. Detect Helm parameter change" >> $GITHUB_STEP_SUMMARY
          echo "2. Render Helm chart with image tag: \`${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Deploy to Kubernetes" >> $GITHUB_STEP_SUMMARY
