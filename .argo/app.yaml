apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: goalixa-auth
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: auth
    app.kubernetes.io/part-of: goalixa
spec:
  project: default
  source:
    repoURL: https://github.com/goalixa/Auth.git
    targetRevision: main
    path: helm
    helm:
      valueFiles:
        - values.yaml
      # Image tag is updated by GitHub workflow via kubectl patch
      parameters:
        - name: image.tag
          value: latest  # Default, overridden by workflow
  destination:
    server: https://kubernetes.default.svc
    namespace: goalixa-auth
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  # Ignore differences that shouldn't trigger sync
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas  # Allow autoscaling to manage replicas
    - group: ""
      kind: Secret
      name: auth-secrets
      jsonPointers:
        - /data  # Allow manual secret management
