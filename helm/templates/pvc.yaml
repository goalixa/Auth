{{- if .Values.persistence.enabled }}
{{- /* Check if PVC already exists (from Kustomize migration) */}}
{{- $existingPVC := lookup "v1" "PersistentVolumeClaim" .Values.namespace.name "auth-data" }}
{{- if not $existingPVC }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: auth-data
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "goalixa-auth.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass }}
  {{- end }}
{{- end }}
{{- end }}
