{{- if .Values.cronJob.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: token-cleanup
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "goalixa-auth.labels" . | nindent 4 }}
spec:
  schedule: "{{ .Values.cronJob.schedule }}"
  successfulJobsHistoryLimit: {{ .Values.cronJob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.cronJob.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        spec:
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
          - name: cleanup
            image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
            imagePullPolicy: {{ .Values.image.pullPolicy }}
            command:
            - python
            - -c
            - |
              from app import create_app
              from auth.models import cleanup_expired_tokens
              import os

              app = create_app()
              with app.app_context():
                  days_to_keep = int(os.getenv("CLEANUP_DAYS_TO_KEEP", "7"))
                  deleted = cleanup_expired_tokens(days_to_keep=days_to_keep)
                  print(f"Cleaned up {deleted} expired tokens (older than {days_to_keep} days)")
            env:
            - name: CLEANUP_DAYS_TO_KEEP
              value: "{{ .Values.cronJob.cleanupDaysToKeep }}"
            - name: AUTH_DATABASE_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: AUTH_DATABASE_URI
          restartPolicy: OnFailure
{{- end }}
