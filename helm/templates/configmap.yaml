apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-config
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "goalixa-auth.labels" . | nindent 4 }}
data:
  # Flask configuration
  LOG_LEVEL: "{{ .Values.env.LOG_LEVEL }}"

  # Auth service configuration
  GOALIXA_APP_URL: "{{ .Values.env.GOALIXA_APP_URL }}"
  AUTH_OAUTH_RETURN_TO_ALLOWLIST: "{{ .Values.env.AUTH_OAUTH_RETURN_TO_ALLOWLIST }}"

  # Legacy single-token TTL
  AUTH_JWT_TTL_MINUTES: "{{ .Values.env.AUTH_JWT_TTL_MINUTES }}"
  AUTH_COOKIE_NAME: "{{ .Values.env.AUTH_COOKIE_NAME }}"

  # Dual-token authentication
  AUTH_ACCESS_TOKEN_TTL_MINUTES: "{{ .Values.env.AUTH_ACCESS_TOKEN_TTL_MINUTES }}"
  AUTH_REFRESH_TOKEN_TTL_DAYS: "{{ .Values.env.AUTH_REFRESH_TOKEN_TTL_DAYS }}"
  AUTH_ACCESS_COOKIE_NAME: "{{ .Values.env.AUTH_ACCESS_COOKIE_NAME }}"
  AUTH_REFRESH_COOKIE_NAME: "{{ .Values.env.AUTH_REFRESH_COOKIE_NAME }}"

  # Cookie settings
  AUTH_COOKIE_SAMESITE: "{{ .Values.env.AUTH_COOKIE_SAMESITE }}"
  AUTH_COOKIE_SECURE: "{{ .Values.env.AUTH_COOKIE_SECURE }}"
  AUTH_COOKIE_DOMAIN: "{{ .Values.env.AUTH_COOKIE_DOMAIN }}"

  # Features
  REGISTERABLE: "{{ .Values.env.REGISTERABLE }}"

  # Server configuration
  PORT: "{{ .Values.env.PORT }}"
  FORCE_SSL: "{{ .Values.env.FORCE_SSL }}"
  PREFERRED_URL_SCHEME: "{{ .Values.env.PREFERRED_URL_SCHEME }}"
