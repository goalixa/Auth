apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "goalixa-auth.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "goalixa-auth.selectorLabels" . | nindent 4 }}
