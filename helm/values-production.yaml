# Production values for goalixa-auth
# Override default values for production environment

image:
  tag: "latest"  # Overridden by ConfigMap

replicaCount: 2  # Higher for HA

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

env:
  LOG_LEVEL: "WARNING"
  FORCE_SSL: "true"
  AUTH_COOKIE_SECURE: "1"

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: auth.goalixa.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: auth-tls
      hosts:
        - auth.goalixa.com
