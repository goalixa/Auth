# Staging values for goalixa-auth
# Override default values for staging environment

image:
  registry: harbor.goalixa.com
  repository: auth-staging/auth
  tag: "latest"

replicaCount: 1

namespace:
  name: goalixa-auth-staging

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false

env:
  LOG_LEVEL: "DEBUG"
  FORCE_SSL: "true"
  AUTH_COOKIE_SECURE: "1"
  EMAIL_ENABLED: "0"
  AUTH_COOKIE_DOMAIN: ".staging.goalixa.com"
  GOALIXA_APP_URL: "https://staging.goalixa.com"
  REGISTERABLE: "1"
  ENVIRONMENT: "staging"  # Disables email verification requirement on staging

# Disable postgres for staging (auth uses SQLite, Longhorn has multipathd issues)
postgres:
  enabled: false

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
  hosts:
    - host: auth-staging.goalixa.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: auth-tls-staging
      hosts:
        - auth-staging.goalixa.com
